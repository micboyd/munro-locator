<nav class="flex flex-wrap gap-3 mb-6">
	@for (tab of tabs; track track) {
	<button type="button" (click)="setActive(tab)"
		class="px-6 py-3 rounded-full text-base font-medium transition-colors duration-200 cursor-pointer"
		[class.bg-neutral-900]="tab === activeTab" [class.text-white]="tab === activeTab"
		[class.bg-neutral-100]="tab !== activeTab" [class.text-neutral-800]="tab !== activeTab"
		[class.hover:bg-neutral-200]="tab !== activeTab" [class.hover:bg-neutral-800]="tab === activeTab">
		{{ tab }}
	</button>
	}
</nav>
