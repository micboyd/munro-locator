@if (toastService.visible) {
    <div
        role="status"
        aria-live="polite"
        class="toast-slide-up fixed bottom-6 right-6 z-50 flex items-center gap-3 rounded-full bg-[#708C69] px-5 py-3 text-white shadow-lg">
        <i class="fa-solid fa-circle-check text-base"></i>
        <span class="text-sm font-medium">{{ toastService.message }}</span>
    </div>
}
