<div class="sidebar">
    <div *ngIf="currentUser" class="sidebar__user">
        <img class="sidebar__profile" src="https://via.placeholder.com/150" />
        <p class="header header--six">
            {{ currentUser.firstname }} {{ currentUser.surname }}
        </p>
        <p class="overline no-margin">
            {{ currentUser.isAdmin ? 'Admin' : 'Munro Bagger' }}
        </p>
    </div>
    <div class="sidebar__navigation">
        <ul>
            <li>
                <a
                    (click)="linkActive()"
                    [ngClass]="{ active: completeActive }"
                    [routerLink]=""
                    >Complete</a
                >
            </li>
            <li>
                <a
                    (click)="linkActive()"
                    [ngClass]="{ active: !completeActive }"
                    [routerLink]=""
                    >Incomplete</a
                >
            </li>
        </ul>
    </div>
    <div class="sidebar__logout">
        <a
            class="button button--white button--full no-margin"
            (click)="logout()"
        >
            Logout
        </a>
    </div>
</div>
