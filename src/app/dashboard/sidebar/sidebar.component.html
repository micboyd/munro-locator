<div class="sidebar">
    <div *ngIf="userDetailsLoaded" class="sidebar__user">
        <img class="sidebar__profile" src="https://via.placeholder.com/150" />
        <p class="header header--six">
            {{ userDetails.firstname }} {{ userDetails.surname }}
        </p>
        <p class="overline no-margin">
            {{ userDetails.isAdmin ? 'Admin' : 'Munro Bagger' }}
        </p>
    </div>
    <div class="sidebar__navigation">
        <ul>
            <li>
                <a routerLink="complete" routerLinkActive="active" href="#"
                    >Complete</a
                >
            </li>
            <li>
                <a routerLink="incomplete" routerLinkActive="active" href="#"
                    >Incomplete</a
                >
            </li>
        </ul>
    </div>
    <div class="sidebar__logout">
        <a
            class="button button--white button--full no-margin"
            (click)="logout()"
            >Logout</a
        >
    </div>
</div>
