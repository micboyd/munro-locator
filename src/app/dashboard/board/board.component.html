<app-container>
    <app-hero heroTitle="Mountain Board" heroSubtitle="Plan and view past and future adventures">
    </app-hero>

    <div class="mb-30">

        <!-- Controls row -->
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-8">

            <!-- Add button -->
            <button
                class="w-full sm:w-auto px-5 py-3 rounded-lg border border-neutral-200 bg-white text-sm font-medium text-neutral-800 hover:bg-neutral-50 transition-colors duration-200 inline-flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus text-sm"></i>
                Add mountain
            </button>

            <!-- Total -->
            <div
                class="w-full sm:w-auto px-5 py-3 rounded-lg border border-neutral-200 bg-white text-sm font-medium text-neutral-800 inline-flex items-center justify-center gap-2">
                <i class="fa-solid fa-mountain text-neutral-400 text-sm"></i>
                <span class="text-neutral-600">Total</span>
                <span class="font-semibold tabular-nums text-neutral-900">4</span>
            </div>
        </div>

        <!-- Board -->
        <div class="grid grid-cols-1 gap-12 lg:grid-cols-2">

            <!-- Planned Column -->
            <section>
                <header class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="h-2.5 w-2.5 rounded-full bg-neutral-300"></span>
                        <h2 class="text-base font-semibold text-neutral-900">Planned</h2>
                        <span
                            class="text-xs font-semibold tabular-nums text-neutral-600 bg-neutral-100 px-2.5 py-1 rounded-md">
                            2
                        </span>
                    </div>
                </header>

                <div class="space-y-6">

                    <!-- Card -->
                    <article
                        class="group bg-white rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg shadow-sm">

                        <div class="relative aspect-[7/5] bg-neutral-200 overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Ben Nevis"
                                class="h-full w-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.03]" />

                            <div class="absolute top-3 left-3">
                                <span
                                    class="text-xs font-semibold bg-white/90 text-neutral-800 px-2.5 py-1 rounded-md border border-neutral-200">
                                    Planned
                                </span>
                            </div>
                        </div>

                        <div class="p-5 space-y-3">
                            <div class="flex flex-wrap gap-2 text-xs text-neutral-500 font-medium">
                                <span class="bg-neutral-100 px-2.5 py-1 rounded-md">Munro</span>
                                <span class="bg-neutral-100 px-2.5 py-1 rounded-md">Scotland</span>
                            </div>

                            <div class="flex items-start justify-between gap-3">
                                <h2 class="text-base font-semibold text-neutral-900 leading-snug">
                                    Ben Nevis
                                </h2>
                                <span class="text-sm font-medium text-neutral-600 whitespace-nowrap">
                                    1345 m
                                </span>
                            </div>

                            <div class="text-sm text-neutral-600">
                                <div class="flex items-center gap-2">
                                    <i class="fa-regular fa-calendar text-neutral-400"></i>
                                    <span>Target: Apr 2026</span>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button
                                    class="w-full px-5 py-3 rounded-full bg-neutral-900 text-white text-sm font-medium hover:bg-neutral-800 transition-colors duration-200">
                                    Start
                                </button>

                                <button
                                    class="px-5 py-3 rounded-full bg-neutral-100 text-neutral-700 hover:bg-neutral-200 transition-colors duration-200">
                                    <i class="fa-solid fa-location-dot"></i>
                                </button>
                            </div>
                        </div>
                    </article>

                    <!-- Card -->
                    <article
                        class="group bg-white rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg shadow-sm">

                        <div class="relative aspect-[7/5] bg-neutral-200 overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e" alt="Piz Bernina"
                                class="h-full w-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.03]" />

                            <div class="absolute top-3 left-3">
                                <span
                                    class="text-xs font-semibold bg-white/90 text-neutral-800 px-2.5 py-1 rounded-md border border-neutral-200">
                                    Planned
                                </span>
                            </div>
                        </div>

                        <div class="p-5 space-y-3">
                            <div class="flex flex-wrap gap-2 text-xs text-neutral-500 font-medium">
                                <span class="bg-neutral-100 px-2.5 py-1 rounded-md">Alpine</span>
                                <span class="bg-neutral-100 px-2.5 py-1 rounded-md">Switzerland</span>
                            </div>

                            <div class="flex items-start justify-between gap-3">
                                <h2 class="text-base font-semibold text-neutral-900 leading-snug">
                                    Piz Bernina
                                </h2>
                                <span class="text-sm font-medium text-neutral-600 whitespace-nowrap">
                                    4049 m
                                </span>
                            </div>

                            <div class="text-sm text-neutral-600">
                                <div class="flex items-center gap-2">
                                    <i class="fa-regular fa-calendar text-neutral-400"></i>
                                    <span>Target: Aug 2026</span>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button
                                    class="w-full px-5 py-3 rounded-full bg-neutral-900 text-white text-sm font-medium hover:bg-neutral-800 transition-colors duration-200">
                                    Start
                                </button>

                                <button
                                    class="px-5 py-3 rounded-full bg-neutral-100 text-neutral-700 hover:bg-neutral-200 transition-colors duration-200">
                                    <i class="fa-solid fa-location-dot"></i>
                                </button>
                            </div>
                        </div>
                    </article>

                </div>
            </section>

            <!-- Completed Column -->
            <section>
                <header class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="h-2.5 w-2.5 rounded-full bg-neutral-400"></span>
                        <h2 class="text-base font-semibold text-neutral-900">Completed</h2>
                        <span
                            class="text-xs font-semibold tabular-nums text-neutral-600 bg-neutral-100 px-2.5 py-1 rounded-md">
                            2
                        </span>
                    </div>
                </header>

                <div class="space-y-6">

                    <article
                        class="group bg-white rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg shadow-sm">

                        <div class="relative aspect-[7/5] bg-neutral-200 overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1454496522488-7a8e488e8606"
                                alt="Hvannadalshnúkur"
                                class="h-full w-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.03]" />

                            <div class="absolute top-3 left-3">
                                <span
                                    class="text-xs font-semibold bg-white/90 text-neutral-800 px-2.5 py-1 rounded-md border border-neutral-200">
                                    Completed
                                </span>
                            </div>
                        </div>

                        <div class="p-5 space-y-3">
                            <div class="flex flex-wrap gap-2 text-xs text-neutral-500 font-medium">
                                <span class="bg-neutral-100 px-2.5 py-1 rounded-md">Volcanic</span>
                                <span class="bg-neutral-100 px-2.5 py-1 rounded-md">Iceland</span>
                            </div>

                            <div class="flex items-start justify-between gap-3">
                                <h2 class="text-base font-semibold text-neutral-900 leading-snug">
                                    Hvannadalshnúkur
                                </h2>
                                <span class="text-sm font-medium text-neutral-600 whitespace-nowrap">
                                    2110 m
                                </span>
                            </div>

                            <div class="text-sm text-neutral-600">
                                <div class="flex items-center gap-2">
                                    <i class="fa-regular fa-calendar text-neutral-400"></i>
                                    <span>Completed: Feb 2025</span>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button
                                    class="w-full px-5 py-3 rounded-full bg-neutral-900 text-white text-sm font-medium hover:bg-neutral-800 transition-colors duration-200">
                                    View notes
                                </button>

                                <button
                                    class="px-5 py-3 rounded-full bg-neutral-100 text-neutral-700 hover:bg-neutral-200 transition-colors duration-200">
                                    <i class="fa-solid fa-location-dot"></i>
                                </button>
                            </div>
                        </div>
                    </article>

                </div>
            </section>

        </div>
    </div>
</app-container>
